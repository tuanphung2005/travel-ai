# Render.com Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: travel-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false # Set manually in Render dashboard
      - key: DB_NAME
        sync: false # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
